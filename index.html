<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>WLUV TRAVEL | Explore The Unknown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Playfair+Display:wght@400;700;900&display=swap');
        
        html { scroll-behavior: smooth; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfcfc; color: #1a1a1a; margin: 0; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 核心：品牌恆亮 Header & 導航 */
        header { position: fixed; top: 0; left: 0; right: 0; height: 100px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-bottom: 1px solid rgba(0,0,0,0.03); }
        header.scrolled { height: 65px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        header.scrolled h1 { font-size: 1.4rem !important; }
        header.scrolled .sub-logo { opacity: 0; height: 0; margin: 0; }

        nav { position: fixed; top: 100px; left: 0; right: 0; height: 55px; background: white; z-index: 490; border-bottom: 1px solid #f0f0f0; transition: 0.4s ease; }
        header.scrolled + nav { top: 65px; }

        /* 節日粒子背景 */
        #festival-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }

        /* 品牌流光動畫 */
        .raya-glow { background: linear-gradient(90deg, #1b5e20, #d4af37, #1b5e20); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 4s linear infinite; }
        .cny-glow { background: linear-gradient(90deg, #b91c1c, #fbbf24, #b91c1c); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 4s linear infinite; }
        @keyframes glow { to { background-position: 200% center; } }

        .fest-decor { position: absolute; top: 15px; z-index: 510; transition: all 0.3s; }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }

        /* 點讚彩蛋效果 */
        @keyframes heartPop { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3) translateY(-50px); opacity: 0; } }
        .heart-effect { position: fixed; color: #ef4444; pointer-events: none; animation: heartPop 0.8s ease-out forwards; z-index: 2000; }

        /* 優化 Date 顯示樣式 */
        .date-label { display: flex; align-items: center; gap: 4px; color: #57534e; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; }
    </style>
</head>
<body class="pt-[165px]">

    <div id="festival-particles"></div>

    <header id="main-header">
        <div id="fest-left" class="fest-decor"></div>
        <div id="fest-right" class="fest-decor"></div>
        <div class="flex flex-col items-center">
            <h1 id="logo-text" class="serif text-3xl font-black tracking-widest text-gray-900 transition-all duration-300">WLUV TRAVEL</h1>
            <div id="sub-logo-text" class="sub-logo text-[8px] tracking-[0.4em] text-stone-400 uppercase font-bold mt-2 transition-all duration-300">EXPLORE THE UNKNOWN</div>
        </div>
    </header>

    <nav id="main-nav">
        <div class="flex overflow-x-auto px-6 no-scrollbar items-center h-full space-x-8">
            <button onclick="scrollToS('custom')" class="flex-none text-[10px] font-bold tracking-widest uppercase text-orange-600">私人訂製</button>
            <button onclick="scrollToS('china')" class="flex-none text-[10px] font-bold tracking-widest uppercase">中國選品</button>
            <button onclick="scrollToS('self')" class="flex-none text-[10px] font-bold tracking-widest uppercase">自家精選</button>
            <button onclick="scrollToS('aurora')" class="flex-none text-[10px] font-bold tracking-widest uppercase">世界極光</button>
            <button onclick="scrollToS('jpkr')" class="flex-none text-[10px] font-bold tracking-widest uppercase">日韓精選</button>
            <button onclick="scrollToS('sea')" class="flex-none text-[10px] font-bold tracking-widest uppercase">東南亞</button>
            <button onclick="scrollToS('corp')" class="flex-none text-[10px] font-bold tracking-widest uppercase text-blue-900">商務服務</button>
            <button onclick="scrollToS('community')" class="flex-none text-[10px] font-bold tracking-widest uppercase text-green-700 font-black">旅人社區</button>
        </div>
    </nav>

    <main>
        <section id="custom" class="px-8 mb-10">
            <div class="relative bg-stone-900 rounded-[3rem] p-10 min-h-[200px] text-white overflow-hidden shadow-xl">
                <div class="absolute inset-0 bg-cover bg-center opacity-40" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1000')"></div>
                <div class="relative z-10"><h2 class="serif text-3xl font-bold mb-6 italic">私人訂製</h2><button onclick="startInquiry('私人訂製專屬行程')" class="fest-btn bg-white text-black px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest active-scale">開始諮詢</button></div>
            </div>
        </section>

        <div id="sections-container">
            <section id="china" class="px-8 mb-10"><h2 class="serif text-xl font-bold italic mb-4">中國深度選品</h2><div id="list-china" class="flex overflow-x-auto space-x-5 no-scrollbar pb-4"></div></section>
            <section id="self" class="px-8 mb-10"><h2 class="serif text-xl font-bold italic mb-4">自家精選團</h2><div id="list-self" class="flex overflow-x-auto space-x-5 no-scrollbar pb-4"></div></section>
            <section id="aurora" class="px-8 mb-10"><h2 class="serif text-xl font-bold italic mb-4">世界極光</h2><div id="list-aurora" class="flex overflow-x-auto space-x-5 no-scrollbar pb-4"></div></section>
            <section id="jpkr" class="px-8 mb-10"><h2 class="serif text-xl font-bold italic mb-4">日韓精選</h2><div id="list-jpkr" class="flex overflow-x-auto space-x-5 no-scrollbar pb-4"></div></section>
            <section id="sea" class="px-8 mb-10"><h2 class="serif text-xl font-bold italic mb-4">東南亞</h2><div id="list-sea" class="flex overflow-x-auto space-x-5 no-scrollbar pb-4"></div></section>
            <section id="corp" class="bg-stone-100 py-16 my-10 px-8"><h2 class="serif text-xl font-bold italic mb-6">商務服務 / Corporate</h2><div id="list-corp" class="flex overflow-x-auto space-x-5 no-scrollbar pb-4"></div></section>
            <section id="community" class="bg-stone-50 py-16 px-8 text-center">
                <h2 class="serif text-2xl font-bold italic mb-4">旅人社區</h2>
                <div id="community-grid" class="columns-2 gap-4 space-y-4"></div>
            </section>
        </div>
    </main>

    <footer class="bg-black text-white py-20 text-center">
        <h2 class="serif text-2xl font-black tracking-[0.3em] mb-4">WLUV TRAVEL</h2>
        <p class="text-[9px] text-stone-500 uppercase tracking-widest font-bold">© 2026 WLUV TRAVEL Global. All Rights Reserved.</p>
    </footer>

    <div id="details-modal" class="fixed inset-0 z-[600] flex items-center justify-center p-6 opacity-0 invisible bg-black/60 backdrop-blur-sm transition-all duration-300">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[80vh]">
            <div class="p-8 pb-4 flex justify-between items-start"><h2 id="modal-title" class="text-xl font-black text-gray-900"></h2><button onclick="closeModal()" class="text-stone-300 p-2">✕</button></div>
            <div id="modal-body" class="p-8 pt-0 overflow-y-auto flex-1 text-stone-600 text-sm leading-relaxed"></div>
            <div class="p-8 border-t border-stone-50"><button onclick="closeModal()" class="w-full bg-black text-white py-4 rounded-2xl text-[11px] font-bold active-scale">返回瀏覽</button></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRolvSEFgDYOzDZWM-xf0UixQTLHRfxGsz-lxlAOVcRf8s5dF2Uw2TBbtp_JCERnAnL_vY8dqT15LVi/pub?output=csv';
        const WHATSAPP = "60108850710";

        // 1. 五大感官交互：全自動節日感應與特效
        function applyFestivalSystem() {
            const m = new Date().getMonth() + 1;
            const logo = document.getElementById('logo-text');
            const sub = document.getElementById('sub-logo-text');

            if (m === 1 || m === 2) { // CNY 新年
                logo.classList.add('cny-glow');
                sub.innerText = "新年快樂 | HAPPY LUNAR NEW YEAR";
                setDecor('🏮'); startParticles('🧧', '✨'); updateThemeColor('#b91c1c');
            } else if (m === 3 || m === 4) { // Raya 開齋節
                logo.classList.add('raya-glow');
                sub.innerText = "Salam Aidilfitri | 歡慶開齋";
                setDecor('🌙'); startParticles('⭐', '🌙'); updateThemeColor('#1b5e20');
            }
        }

        function setDecor(emoji) {
            const svg = `<div class="flex flex-col items-center"><div class="w-[1px] h-6 bg-stone-200 mb-1"></div><span class="text-xl">${emoji}</span></div>`;
            document.getElementById('fest-left').innerHTML = svg;
            document.getElementById('fest-right').innerHTML = svg;
        }

        function startParticles(e1, e2) {
            const container = document.getElementById('festival-particles');
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.innerText = Math.random() > 0.5 ? e1 : e2;
                p.style.position = 'absolute'; p.style.left = Math.random() * 100 + 'vw'; p.style.top = '-20px';
                p.style.opacity = '0.6'; p.style.transition = `transform ${Math.random()*5+5}s linear, opacity 5s`;
                container.appendChild(p);
                setTimeout(() => { p.style.transform = `translateY(110vh) rotate(${Math.random()*360}deg)`; p.style.opacity = '0'; }, 100);
            }
        }

        function updateThemeColor(color) {
            document.querySelectorAll('.fest-btn').forEach(b => { b.style.backgroundColor = color; b.style.color = 'white'; });
        }

        // 2. 交互彩蛋：點讚特效
        function triggerHeartEffect(e) {
            const h = document.createElement('div'); h.innerHTML = '❤️'; h.className = 'heart-effect';
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            document.body.appendChild(h); setTimeout(() => h.remove(), 800);
        }

        // 3. 數據讀取與顯示 (含優化 Date 與 Verified)
        async function initData() {
            try {
                const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const containers = { 'china': document.getElementById('list-china'), 'self': document.getElementById('list-self'), 'aurora': document.getElementById('list-aurora'), 'jpkr': document.getElementById('list-jpkr'), 'sea': document.getElementById('list-sea'), 'corp': document.getElementById('list-corp'), 'community': document.getElementById('community-grid') };

                rows.forEach((cols) => {
                    const [cat, title, date, price, img] = cols.map(c => (c || "").replace(/"/g, '').trim());
                    if (!title || !img) return;

                    if (cat.includes("評論") || cat.includes("社區")) {
                        containers.community.innerHTML += `<div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-stone-50 break-inside-avoid mb-4" onclick="triggerHeartEffect(event)"><img src="${img}" class="w-full" onclick="openModal('${title}', \`${price}\`)"><div class="p-3"><p class="text-[10px] mb-2">${price.split('|')[0]}</p><span class="text-[8px] text-stone-300">@${title}</span></div></div>`;
                    } else {
                        let target = cat.includes("中國")?'china':cat.includes("極光")?'aurora':cat.includes("日韓")?'jpkr':cat.includes("東南亞")?'sea':cat.includes("商務")?'corp':'self';
                        if (containers[target]) {
                            containers[target].innerHTML += `
                                <div class="flex-none w-[240px] bg-white rounded-[2rem] overflow-hidden border border-stone-100 shadow-sm active-scale">
                                    <div class="relative h-[140px] m-2 overflow-hidden rounded-[1.4rem]">
                                        <div class="absolute top-2 left-2 z-20 bg-white/90 px-2 py-1 rounded-full text-[7px] font-bold uppercase text-gray-900 shadow-sm">Verified</div>
                                        <img src="${img}" class="w-full h-full object-cover cursor-pointer" onclick="openModal('${title}', \`${price}\`)">
                                    </div>
                                    <div class="px-4 pb-5">
                                        <h3 class="text-sm font-bold truncate">${title}</h3>
                                        <div class="date-label">
                                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                            <span>${date || 'COMING SOON'}</span>
                                        </div>
                                        <div class="flex items-center justify-between mt-4 pt-3 border-t border-stone-50">
                                            <span class="text-sm font-black italic serif">${price.split('|')[0]}</span>
                                            <button onclick="startInquiry('${title}')" class="bg-black text-white p-2 rounded-lg fest-btn"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
                                        </div>
                                    </div>
                                </div>`;
                        }
                    }
                });
            } catch (e) { console.log("Sheet Load Error"); }
        }

        // 4. WhatsApp 專業預設表單
        function startInquiry(n) {
            const message = `你好，我想諮詢以下項目：\n\n*行程：* ${n}\n\n---\n📍 目的地：\n👥 預計人數：\n💰 預算範圍：\n📅 出發日期：\n📝 其他需求：\n\n請協助提供詳細資訊，謝謝！`;
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function openModal(t, p) {
            document.getElementById('modal-title').innerText = t;
            const content = p.split('|').map(item => `<div class="mb-3 flex gap-2"><span>✦</span><span>${item.trim()}</span></div>`).join('');
            document.getElementById('modal-body').innerHTML = content;
            const m = document.getElementById('details-modal'); m.classList.remove('invisible'); m.classList.add('opacity-100');
        }

        function closeModal() {
            const m = document.getElementById('details-modal'); m.classList.remove('opacity-100'); setTimeout(() => m.classList.add('invisible'), 300);
        }

        function scrollToS(id) { window.scrollTo({ top: document.getElementById(id).offsetTop - 120, behavior: 'smooth' }); }
        
        window.addEventListener('scroll', () => {
            const h = document.getElementById('main-header');
            window.scrollY > 40 ? h.classList.add('scrolled') : h.classList.remove('scrolled');
        });

        applyFestivalSystem();
        initData();
    </script>
</body>
</html>
