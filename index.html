<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>WLUV TRAVEL | Ver 5.2.2 Final Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Playfair+Display:wght@400;700;900&display=swap');
        
        html { scroll-behavior: smooth; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fafafa; color: #1a1a1a; margin: 0; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- Header & 動態副標題 --- */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 100px; 
            background: rgba(255,255,255,0.95); z-index: 500; 
            display: flex; align-items: center; padding: 0 32px; 
            transition: 0.4s ease; backdrop-filter: blur(15px); 
        }
        header.scrolled { height: 60px; border-bottom: 1px solid #f0f0f0; }
        .logo-group { display: flex; flex-direction: column; align-items: flex-start; }
        header h1 { font-size: 1.6rem; line-height: 1.1; transition: 0.4s; }
        header.scrolled h1 { font-size: 1.25rem; }
        
        .sub-logo { 
            font-size: 8px; letter-spacing: 0.25em; color: #a1a1aa; 
            font-weight: 800; text-transform: uppercase; margin-top: 6px;
            transition: 0.3s;
        }
        header.scrolled .sub-logo { opacity: 0; height: 0; margin: 0; transform: translateY(-5px); }

        .holiday-right { 
            display: inline-block; margin-left: 10px; font-size: 1.2rem;
            animation: holidayFloat 3s ease-in-out infinite; 
        }
        @keyframes holidayFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(8deg); } }

        /* --- Nav & 跑馬燈 --- */
        nav { position: fixed; top: 100px; left: 0; right: 0; height: 65px; z-index: 490; display: flex; align-items: center; transition: 0.4s; }
        header.scrolled + nav { top: 60px; }
        .nav-capsule {
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50px;
            margin: 0 20px; padding: 6px; display: flex; overflow-x: auto; gap: 6px; width: 100%;
        }
        .nav-item { padding: 8px 18px; border-radius: 50px; font-size: 11px; font-weight: 900; white-space: nowrap; transition: 0.3s; color: #555; }

        #marquee-container { position: fixed; top: 165px; left: 0; right: 0; height: 35px; background: #000; color: #fff; z-index: 480; display: flex; align-items: center; overflow: hidden; transition: 0.4s; }
        header.scrolled + nav + #marquee-container { top: 125px; height: 30px; }
        .marquee-content { display: flex; white-space: nowrap; animation: marquee 60s linear infinite; }
        #marquee-container:hover .marquee-content { animation-play-state: paused; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- 呼吸燈與箭頭動畫 --- */
        .dot-breath { width: 7px; height: 7px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px rgba(239, 68, 68, 0.6); animation: breathing 2s infinite; }
        @keyframes breathing { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }
        
        @keyframes bounce-x { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(6px); } }
        .animate-bounce-x { animation: bounce-x 1.2s infinite; }

        /* --- Popup & Image Viewer --- */
        #image-viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; cursor: zoom-out; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .detail-card { background: white; width: 100%; max-width: 420px; max-height: 80vh; border-radius: 40px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .close-btn { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; background: #f4f4f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-weight: bold; }
        .pop-body { overflow-y: auto; padding: 50px 32px 20px 32px; flex-grow: 1; }
        .pop-footer { padding: 20px 32px 35px 32px; background: white; border-top: 1px solid #f4f4f5; }

        main { padding-top: 220px; }
        .trip-card { flex: none; width: 260px; background: white; border-radius: 2.5rem; overflow: hidden; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="image-viewer" onclick="this.style.display='none'"><img id="viewer-img" class="max-w-[90%] max-h-[85%] rounded-xl object-contain" src=""></div>

    <header id="main-header">
        <div class="logo-group">
            <div class="flex items-center">
                <h1 class="serif font-black tracking-tighter text-stone-900 uppercase">WLUV TRAVEL</h1>
                <span id="holiday-right" class="holiday-right"></span>
            </div>
            <div id="dynamic-sub" class="sub-logo">EXPLORE THE UNKNOWN</div>
        </div>
    </header>

    <nav id="main-nav">
        <div class="nav-capsule no-scrollbar">
            <button onclick="scrollToS('custom')" class="nav-item text-orange-600">私人訂製</button>
            <button onclick="scrollToS('china')" class="nav-item">中國選品</button>
            <button onclick="scrollToS('self')" class="nav-item">自家精選</button>
            <button onclick="scrollToS('aurora')" class="nav-item">世界極光</button>
            <button onclick="scrollToS('jpkr')" class="nav-item">日韓精選</button>
            <button onclick="scrollToS('sea')" class="nav-item">東南亞</button>
            <button onclick="scrollToS('corp')" class="nav-item text-blue-800">商務服務</button>
            <button onclick="scrollToS('community')" class="nav-item text-green-700">旅人社區</button>
        </div>
    </nav>

    <div id="marquee-container"><div id="marquee-track" class="marquee-content"></div></div>

    <div id="detail-overlay" onclick="closePop()">
        <div class="detail-card" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closePop()">✕</div>
            <div class="pop-body">
                <div id="pop-tags" class="text-[9px] font-black text-blue-700 mb-2 uppercase tracking-widest"></div>
                <h2 id="pop-title" class="serif text-2xl font-black mb-4 leading-tight"></h2>
                <div id="pop-stock-display" class="mb-6 flex items-center text-[10px] text-red-500 font-black"></div>
                <div id="pop-list" class="space-y-4"></div>
            </div>
            <div class="pop-footer">
                <button id="pop-wa-btn" class="w-full bg-black text-white py-5 rounded-3xl font-black text-sm tracking-widest active:scale-95 transition shadow-lg">立即聯繫諮詢</button>
            </div>
        </div>
    </div>

    <main>
        <div id="sections-container" class="space-y-20 pb-40">
            <section id="custom" class="px-6 mb-16">
                <div class="group bg-stone-900 rounded-[3rem] p-12 min-h-[220px] text-white relative overflow-hidden active:scale-95 transition cursor-pointer shadow-xl" onclick="waInquiry('私人訂製行程諮詢')">
                    <img id="custom-bg" src="" class="absolute inset-0 w-full h-full object-cover opacity-40 transition-transform duration-1000 group-hover:scale-110" alt="Season BG">
                    
                    <div class="relative z-10 flex flex-col justify-center h-full">
                        <h2 class="serif text-4xl font-black italic">私人訂製</h2>
                        <p class="text-sm font-light tracking-[0.5em] opacity-80 mt-4 uppercase">共創回憶</p>
                    </div>

                    <div class="absolute bottom-8 right-10 z-10 flex items-center space-x-3 opacity-70 group-hover:opacity-100 transition-opacity">
                        <span class="text-[9px] font-black tracking-widest uppercase">立即諮詢</span>
                        <div class="animate-bounce-x">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
            </section>
            
            <section id="china" class="px-6"><h2 class="serif text-xl font-black italic mb-8">中國深度選品</h2><div id="list-china" class="flex overflow-x-auto space-x-7 no-scrollbar px-2"></div></section>
            <section id="self" class="px-6"><h2 class="serif text-xl font-black italic mb-8">自家精選團</h2><div id="list-self" class="flex overflow-x-auto space-x-7 no-scrollbar px-2"></div></section>
            <section id="aurora" class="px-6"><h2 class="serif text-xl font-black italic mb-8">世界極光</h2><div id="list-aurora" class="flex overflow-x-auto space-x-7 no-scrollbar px-2"></div></section>
            <section id="jpkr" class="px-6"><h2 class="serif text-xl font-black italic mb-8">日韓精選</h2><div id="list-jpkr" class="flex overflow-x-auto space-x-7 no-scrollbar px-2"></div></section>
            <section id="sea" class="px-6"><h2 class="serif text-xl font-black italic mb-8">東南亞</h2><div id="list-sea" class="flex overflow-x-auto space-x-7 no-scrollbar px-2"></div></section>
            <section id="corp" class="px-6"><h2 class="serif text-xl font-black italic mb-8 text-blue-800">商務服務</h2><div id="list-corp" class="flex overflow-x-auto space-x-7 no-scrollbar px-2"></div></section>
            
            <section id="community" class="bg-stone-50 py-20 px-6">
                <h2 class="serif text-3xl font-black italic mb-10 text-center">旅人社區</h2>
                <div id="community-grid" class="columns-2 gap-5"></div>
            </section>
        </div>
    </main>

    <footer class="bg-black text-white py-20 text-center">
        <h2 class="serif text-2xl font-black tracking-[0.4em] mb-4">WLUV TRAVEL</h2>
        <p class="text-[9px] text-stone-500 tracking-widest uppercase font-bold">© 2026 WLUV TRAVEL Global.</p>
    </footer>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRolvSEFgDYOzDZWM-xf0UixQTLHRfxGsz-lxlAOVcRf8s5dF2Uw2TBbtp_JCERnAnL_vY8dqT15LVi/pub?output=csv';
        const WHATSAPP = "60108850710";
        let googleData = [];

        const seasonImages = {
            sakura: 'https://images.unsplash.com/photo-1522383225653-ed111181a951?q=80&w=1200',
            summer: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200',
            autumn: 'https://images.unsplash.com/photo-1506126613408-eca07ce68773?q=80&w=1200',
            winter: 'https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?q=80&w=1200',
            default: 'https://images.unsplash.com/photo-1503221043305-f7498f8b7888?q=80&w=1200'
        };

        function applyHoliday() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const subEl = document.getElementById('dynamic-sub');
            const iconEl = document.getElementById('holiday-right');
            const customBgEl = document.getElementById('custom-bg');
            
            let subText = "EXPLORE THE UNKNOWN";
            let icon = "✨";
            let customBg = seasonImages.default;

            if (month >= 3 && month <= 4) {
                subText = "SAKURA SEASON | 櫻花季"; icon = "🌸"; customBg = seasonImages.sakura;
            } else if (month >= 6 && month <= 8) {
                subText = "SUMMER VIBES | 盛夏避暑"; icon = "🌊"; customBg = seasonImages.summer;
            } else if (month === 10) {
                subText = "AUTUMN LEAVES | 楓葉季"; icon = "🍁"; customBg = seasonImages.autumn;
            } else if (month >= 11 || month <= 2) {
                if (month <= 2) { subText = "LUNAR NEW YEAR | 慶新春"; icon = "🧧"; }
                else { subText = "WINTER WONDERLAND | 冬日祭"; icon = "❄️"; }
                customBg = seasonImages.winter;
            }

            if (subEl) subEl.innerText = subText;
            if (iconEl) iconEl.innerText = icon;
            if (customBgEl) {
                customBgEl.style.opacity = 0;
                setTimeout(() => { customBgEl.src = customBg; customBgEl.style.opacity = 0.4; }, 100);
            }
        }

        async function initData() {
            try {
                const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                let hot = [];

                rows.forEach((cols, idx) => {
                    const [cat, title, date, price, img, stock, link, tags] = cols.map(c => (c || "").replace(/"/g, '').trim());
                    if (!title) return;
                    googleData[idx] = { title, price, img, stock: parseInt(stock)||0, tags };
                    
                    if (cat.includes("社區")) {
                        document.getElementById('community-grid').innerHTML += `
                            <div class="bg-white rounded-[2rem] overflow-hidden mb-6 border border-stone-100 shadow-sm active:scale-95 transition cursor-pointer" onclick="zoomImage('${img}')">
                                <img src="${img}" class="w-full">
                                <div class="p-5">
                                    <p class="text-[11px] text-gray-600 leading-relaxed italic mb-3">"${price.replace(/\|/g, ' ')}"</p>
                                    <div class="flex justify-between items-center"><span class="text-[9px] font-black text-stone-300">@ ${title}</span><span>❤️</span></div>
                                </div>
                            </div>`;
                        return;
                    }

                    if (parseInt(stock) > 0) hot.push({title, stock, id: idx});

                    let tid = "";
                    if (cat.includes("中國")) tid = "list-china";
                    else if (cat.includes("自家")) tid = "list-self";
                    else if (cat.includes("極光")) tid = "list-aurora";
                    else if (cat.includes("日韓")) tid = "list-jpkr";
                    else if (cat.includes("東南亞")) tid = "list-sea";
                    else if (cat.includes("商務")) tid = "list-corp";

                    if (tid) {
                        document.getElementById(tid).innerHTML += `
                            <div class="trip-card active:scale-95 transition cursor-pointer" onclick="openPop(${idx})">
                                <div class="h-[170px] m-2 overflow-hidden rounded-[2rem]"><img src="${img}" class="w-full h-full object-cover"></div>
                                <div class="p-5">
                                    <div class="text-[9px] font-black text-blue-600 mb-1 uppercase">${tags ? '[ ' + tags + ' ]' : ''}</div>
                                    <h3 class="text-[13px] font-black text-stone-900 leading-tight mb-2 h-10 overflow-hidden">${title}</h3>
                                    <div class="text-[9px] font-bold text-stone-400 mb-2">${date}</div>
                                    ${stock > 0 ? `<div class="flex items-center text-[10px] text-red-500 font-black"><span class="dot-breath"></span>僅餘 ${stock} 席</div>` : ''}
                                </div>
                            </div>`;
                    }
                });
                updateMarquee(hot);
            } catch (e) { console.error("Data error"); }
        }

        function updateMarquee(items) {
            const track = document.getElementById('marquee-track');
            const content = items.map(i => `
                <div class="mx-8 font-black text-[10px] cursor-pointer hover:text-yellow-400 transition-colors" onclick="openPop(${i.id})">
                    🔥 ${i.title} / <span style="color:#FFD700">僅餘 ${i.stock} 位</span>
                </div>
            `).join('');
            track.innerHTML = content + content;
        }

        function zoomImage(src) {
            document.getElementById('viewer-img').src = src;
            document.getElementById('image-viewer').style.display = 'flex';
        }

        function openPop(idx) {
            const data = googleData[idx];
            if (!data) return;
            document.getElementById('pop-title').innerText = data.title;
            document.getElementById('pop-tags').innerText = data.tags ? `[ ${data.tags} ]` : '';
            const stockDiv = document.getElementById('pop-stock-display');
            stockDiv.innerHTML = data.stock > 0 ? `<span class="dot-breath"></span>目前僅餘 ${data.stock} 席，建議儘速諮詢` : '';
            const list = document.getElementById('pop-list');
            list.innerHTML = '';
            data.price.split('|').forEach(p => { if(p.trim()) list.innerHTML += `<div class="flex items-start text-[14px] leading-relaxed"><span class="text-stone-300 mr-3 mt-1.5 text-[8px]">✦</span><span>${p.trim()}</span></div>`; });
            document.getElementById('pop-wa-btn').onclick = () => waInquiry(data.title);
            document.getElementById('detail-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function waInquiry(title) {
            const msg = `你好，我想諮詢以下項目：\n\n*${title}*\n\n---\n📍 目的地：\n👥 人數：\n📅 出發日期：\n💰 預算：\n📝 其他需求：`;
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function closePop() { document.getElementById('detail-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function scrollToS(id) { const el = document.getElementById(id); if(el) window.scrollTo({ top: el.offsetTop - 130, behavior: 'smooth' }); }
        
        applyHoliday();
        initData();
        window.addEventListener('scroll', () => {
            const h = document.getElementById('main-header');
            window.scrollY > 50 ? h.classList.add('scrolled') : h.classList.remove('scrolled');
        });
    </script>
</body>
</html>
